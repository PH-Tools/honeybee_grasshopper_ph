# Deploy static redirect pages to GitHub Pages
# Old URLs (ph-tools.github.io/honeybee_grasshopper_ph/*) redirect
# to the new site at passivehousetools.com
name: Deploy Redirects to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/public/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
